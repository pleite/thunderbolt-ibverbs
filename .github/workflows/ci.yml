name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nix:
    name: nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Evaluate flake
        run: nix flake check --all-systems --no-build

      - name: Build kernel module package
        run: nix build .#thunderbolt-ibverbs --print-build-logs

  distro:
    name: distro (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:sid
          - fedora:rawhide
          - archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build in ${{ matrix.image }}
        run: tools/ci/distro-build.sh ${{ matrix.image }}
