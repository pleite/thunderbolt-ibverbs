name: release-artefacts

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: 'When triggered manually against a v* tag, also create / update a GitHub Release.'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-artefacts-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            distro: debian
            image: debian:sid
            build_dkms: true
            dkms_glob: 'dist/thunderbolt-ibverbs-dkms_*.deb'
            rdma_glob: 'dist/usb4-rdma-provider_*.deb'
            upload_glob: 'dist/*.deb'
          - name: fedora
            distro: fedora
            image: fedora:rawhide
            build_dkms: true
            dkms_glob: 'dist/thunderbolt-ibverbs-dkms-*.rpm'
            rdma_glob: 'dist/usb4-rdma-provider-*.rpm'
            upload_glob: 'dist/*.rpm'
          - name: arch
            distro: arch
            image: archlinux:latest
            build_dkms: true
            dkms_glob: 'dist/thunderbolt-ibverbs-dkms-*.pkg.tar.zst'
            rdma_glob: 'dist/usb4-rdma-provider-*.pkg.tar.zst'
            upload_glob: 'dist/*.pkg.tar.zst'
          - name: ubuntu-jammy
            distro: ubuntu
            image: ubuntu:22.04
            build_dkms: false
            rdma_glob: 'dist/usb4-rdma-provider_*~jammy_amd64.deb'
            upload_glob: 'dist/usb4-rdma-provider_*~jammy_amd64.deb'
          - name: ubuntu-noble
            distro: ubuntu
            image: ubuntu:24.04
            build_dkms: false
            rdma_glob: 'dist/usb4-rdma-provider_*~noble_amd64.deb'
            upload_glob: 'dist/usb4-rdma-provider_*~noble_amd64.deb'
    steps:
      - uses: actions/checkout@v4

      - name: Build DKMS package in ${{ matrix.image }}
        if: matrix.build_dkms
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TBV_LINT=1 \
            ${{ matrix.image }} \
            bash tools/ci/distro-package.sh ${{ matrix.distro }}

      - name: Build rdma-provider package in ${{ matrix.image }}
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ${{ matrix.image }} \
            bash tools/ci/distro-package-rdma.sh ${{ matrix.distro }}
          ls -la dist/

      - name: Verify DKMS install in ${{ matrix.image }}
        if: matrix.build_dkms
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ${{ matrix.image }} \
            bash tools/ci/distro-install.sh '${{ matrix.dkms_glob }}'

      - name: Verify rdma-provider install in ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ${{ matrix.image }} \
            bash tools/ci/distro-install.sh '${{ matrix.rdma_glob }}'

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: thunderbolt-ibverbs-${{ matrix.name }}
          path: ${{ matrix.upload_glob }}
          if-no-files-found: error

  nix:
    name: nix checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Packaging sync check
        run: bash tools/ci/check-packaging-sync.sh

      - name: Nix script-syntax check
        run: nix build --no-link .#checks.x86_64-linux.script-syntax

      - name: Nix proto-smoke
        run: nix build --no-link .#checks.x86_64-linux.proto-smoke

      - name: Nix rdma-core-usb4 provider build
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: nix build --no-link .#rdma-core-usb4

  kernel-hygiene:
    name: kernel static-analysis + memory-safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kernel analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sparse

      - name: checkpatch on changed kernel/proto files
        shell: bash
        run: |
          set -euo pipefail

          checkpatch="/lib/modules/$(uname -r)/build/scripts/checkpatch.pl"
          if [[ ! -f "$checkpatch" ]]; then
            echo "checkpatch.pl not found at $checkpatch" >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            base="$(git merge-base HEAD "origin/${{ github.base_ref }}")"
            range="$base...HEAD"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            range="${{ github.event.before }}...${{ github.sha }}"
          else
            range="HEAD~1...HEAD"
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$range" -- 'kernel/*.[ch]' 'proto/*.[ch]')
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No kernel/proto changes; skipping checkpatch."
            exit 0
          fi

          perl "$checkpatch" --no-tree --strict --show-types --terse --file "${files[@]}"

      - name: sparse build (warnings as errors)
        run: |
          make -C kernel \
            KVER="$(uname -r)" \
            KDIR="/lib/modules/$(uname -r)/build" \
            C=2 CHECK=sparse CF=-Wsparse-error \
            modules
          make -C kernel \
            KVER="$(uname -r)" \
            KDIR="/lib/modules/$(uname -r)/build" \
            clean

      - name: optional smatch build
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v smatch >/dev/null 2>&1; then
            echo "smatch not available on runner; skipping optional smatch pass."
            exit 0
          fi
          make -C kernel \
            KVER="$(uname -r)" \
            KDIR="/lib/modules/$(uname -r)/build" \
            C=2 CHECK=smatch \
            modules
          make -C kernel \
            KVER="$(uname -r)" \
            KDIR="/lib/modules/$(uname -r)/build" \
            clean

      - name: KASAN/KCSAN warning-error build targets
        shell: bash
        run: |
          set -euo pipefail
          for sanitizer in KASAN KCSAN; do
            make -C kernel \
              KVER="$(uname -r)" \
              KDIR="/lib/modules/$(uname -r)/build" \
              KCFLAGS="-Werror" \
              KBUILD_MODPOST_WARN=1 \
              "CONFIG_${sanitizer}=y" \
              modules
            make -C kernel \
              KVER="$(uname -r)" \
              KDIR="/lib/modules/$(uname -r)/build" \
              clean
          done

      - name: optional proto wire parser fuzzing
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v clang >/dev/null 2>&1; then
            echo "clang unavailable; skipping optional proto fuzzing."
            exit 0
          fi
          cat > /tmp/tbv-proto-wire-fuzz.c <<'EOF'
          #include <stddef.h>
          #include <stdint.h>
          #include <string.h>
          #include "proto/native_wire.h"

          int LLVMFuzzerTestOneInput(const uint8_t *data, size_t size)
          {
          	struct tbv_native_wire_hello hello;
          	struct tbv_native_wire_info info;
          	uint8_t out[TBV_NATIVE_WIRE_HELLO_MSG_SIZE];
          	int ret;

          	memset(&hello, 0, sizeof(hello));
          	memset(&info, 0, sizeof(info));
          	ret = tbv_native_wire_parse_hello(data, size, &hello, &info);
          	if (ret == 0) {
          		(void)tbv_native_wire_build_hello(out, sizeof(out), &hello,
          						  info.op, info.flags, info.seq,
          						  info.route, info.xdomain_sequence);
          	}
          	return 0;
          }
          EOF
          if ! clang -std=c11 -Wall -Wextra -Werror -fsanitize=fuzzer,address -I. /tmp/tbv-proto-wire-fuzz.c -o /tmp/tbv-proto-wire-fuzz; then
            echo "libFuzzer toolchain unavailable; skipping optional proto fuzzing."
            exit 0
          fi
          /tmp/tbv-proto-wire-fuzz -max_total_time=15 -runs=0

  release:
    name: Publish GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.publish) }}
    needs: [build, nix, kernel-hygiene]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected artefacts
        run: ls -la dist/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "$tag" \
              --generate-notes
          fi
