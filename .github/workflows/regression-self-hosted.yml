name: regression-self-hosted

on:
  workflow_dispatch:
    inputs:
      hosts:
        description: "Two SSH hostnames/IPs (hostA,hostB)"
        required: true
        type: string
      iface:
        description: "Socket interface for GLOO/NCCL/RCCL"
        required: false
        default: "eno1"
        type: string
      transport:
        description: "vLLM smoke transport"
        required: false
        default: "native"
        type: choice
        options:
          - native
          - gda
      wrapper:
        description: "Remote vLLM/PyTorch wrapper path"
        required: false
        default: ""
        type: string
      baseline_csv:
        description: "Committed smoke baseline CSV for regression comparison"
        required: false
        default: "bench/perftest-smoke-baseline.csv"
        type: string
      bw_drop_pct:
        description: "Maximum allowed bandwidth drop (%) vs baseline"
        required: false
        default: "7.5"
        type: string
      lat_rise_pct:
        description: "Maximum allowed latency rise (%) vs baseline"
        required: false
        default: "12.5"
        type: string
      out_root:
        description: "Directory where run artifacts are written"
        required: false
        default: "thunderbolt-ibverbs/results/regression"
        type: string

jobs:
  regression:
    permissions:
      contents: read
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Run two-node regression suite
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ inputs.baseline_csv }}"
          args=(
            --hosts "${{ inputs.hosts }}"
            --iface "${{ inputs.iface }}"
            --transport "${{ inputs.transport }}"
            --require-baseline
            --bw-drop-pct "${{ inputs.bw_drop_pct }}"
            --lat-rise-pct "${{ inputs.lat_rise_pct }}"
            --out-root "${{ inputs.out_root }}"
          )
          if [[ -n "${{ inputs.wrapper }}" ]]; then
            args+=(--wrapper "${{ inputs.wrapper }}")
          fi
          args+=(--baseline-csv "${{ inputs.baseline_csv }}")

          nix run .#tbv-regression -- "${args[@]}"

      - name: Summarize and enforce perftest smoke baseline
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          latest_csv="${{ inputs.out_root }}/latest/perftest-smoke.csv"
          test -f "$latest_csv"
          test -f "${{ inputs.baseline_csv }}"
          python3 bench/summarize_perftest.py \
            --baseline "${{ inputs.baseline_csv }}" \
            --bw-drop-pct "${{ inputs.bw_drop_pct }}" \
            --lat-rise-pct "${{ inputs.lat_rise_pct }}" \
            --require-baseline-match \
            "$latest_csv"

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tbv-regression-results
          path: ${{ inputs.out_root }}
          if-no-files-found: warn
