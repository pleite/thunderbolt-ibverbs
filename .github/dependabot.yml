version: 2
updates:
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      nix-inputs:
        patterns:
          - "*"
        group-by: "dependency-name"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        group-by: "dependency-name"
